<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fd3f4"/>
      <stop offset="50%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#e8f8ff"/>
